version: "3.8"

services:
  web:
    # Production: use the pre-built image from GitHub Container Registry.
    # See https://github.com/macedot/go-mega/pkgs/container/go-mega
    image: ghcr.io/macedot/go-mega:latest

    # The container runs as nonroot (UID 65532) by default in the image.
    # Named volumes are created with root ownership. Running as root here
    # ensures the app can create/write the SQLite database on first start.
    # If you prefer non-root, use a bind mount and `chown 65532:65532` the
    # host directory, or run: docker compose run --rm -u 0 web true
    user: "0:0"

    restart: unless-stopped
    environment:
      - APP_ENV=production
      - PORT=8080
      - APP_SECRET=${APP_SECRET:-change-this-to-a-long-random-string-in-prod}
      - STORAGE_PATH=/app/storage
      - HOST=${HOST:-localhost:8080}
      - USER_DISK_QUOTA_BYTES=${USER_DISK_QUOTA_BYTES:-5368709120}
      # Add for Cloudflare Tunnel:
      # - WEBAUTHN_ORIGIN=https://yourhost.example.com
      # - WEBAUTHN_RP_ID=yourhost.example.com
    volumes:
      - uploads:/app/storage
    # For local direct access (no CF): expose 8080
    # ports:
    #   - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/up"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  uploads:
