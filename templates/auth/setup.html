<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ .Title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="/icons/icon.png">
</head>
<body class="h-full flex items-center justify-center bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100">
  <div class="w-full max-w-md px-6">
    <div class="bg-white dark:bg-zinc-900 rounded-2xl shadow-xl p-8 border border-zinc-200 dark:border-zinc-800">
      <h1 class="text-2xl font-semibold mb-1">Welcome to go-mega</h1>
      <p class="text-sm text-zinc-500 dark:text-zinc-400 mb-6">Create the first admin account. This is a one-time setup.</p>

      {{ if .Error }}
      <div class="mb-4 p-3 bg-red-50 dark:bg-red-950 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 text-sm rounded">{{ .Error }}</div>
      {{ end }}

      <form method="post" action="/setup" class="space-y-4">
        <input type="hidden" name="_csrf" value="{{ .CSRF }}">
        <div>
          <label class="block text-sm mb-1 text-zinc-600 dark:text-zinc-400">Email address</label>
          <input type="email" name="email_address" required class="w-full px-4 py-3 rounded-xl border border-zinc-300 dark:border-zinc-700 dark:bg-zinc-900">
        </div>
        <div>
          <label class="block text-sm mb-1 text-zinc-600 dark:text-zinc-400">Password (min 12 chars)</label>
          <input type="password" name="password" required minlength="12" class="w-full px-4 py-3 rounded-xl border border-zinc-300 dark:border-zinc-700 dark:bg-zinc-900">
        </div>
        <button class="w-full py-3 bg-red-600 hover:bg-red-500 text-white font-semibold rounded-xl">Create admin account</button>
      </form>
    </div>
    <p class="text-center text-[10px] text-zinc-400 dark:text-zinc-500 mt-4">Files auto-expire. Invite-only for additional users (coming soon).</p>
  </div>
</body>
</html>
