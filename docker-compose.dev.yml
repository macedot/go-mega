version: "3.8"

services:
  web:
    # Development: build the image locally from source.
    # Use this for testing changes without pushing to GHCR.
    build: .
    image: go-mega:dev
    restart: unless-stopped
    environment:
      - APP_ENV=development
      - PORT=8080
      - APP_SECRET=${APP_SECRET:-dev-secret-change-in-production}
      - STORAGE_PATH=/app/storage
      - HOST=${HOST:-localhost:8080}
      # Add for Cloudflare Tunnel (optional even in dev):
      # - WEBAUTHN_ORIGIN=https://yourhost.example.com
      # - WEBAUTHN_RP_ID=yourhost.example.com
    volumes:
      - uploads:/app/storage
    # Expose port by default for local development
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/up"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  uploads:
