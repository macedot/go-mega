<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Not found — go-mega</title><script src="https://cdn.tailwindcss.com"></script>
<!-- Silence the "do not use CDN in production" warning from the Tailwind Play CDN.
     This app intentionally uses the CDN for zero-build-step nice styling. -->
<script>!function(){var w=console.warn;console.warn=function(m){if(m&&m.toString().indexOf('cdn.tailwindcss.com')!==-1)return;w.apply(console,arguments);}}(console.warn);</script></head>
<body class="min-h-screen bg-zinc-50 dark:bg-zinc-950 flex items-center justify-center">
  <div class="text-center p-8">
    <div class="text-6xl mb-4">🔍</div>
    <h1 class="text-2xl font-semibold">File not found</h1>
    <p class="mt-2 text-sm text-zinc-500 dark:text-zinc-400">The download link is invalid or has been removed.</p>
  </div>
</body></html>
